<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zracross Complaint Portal</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0b1f4d,#1a73e8);
}
.wrap{
max-width:900px;
margin:30px auto;
padding:20px;
}
.card{
background:#fff;
border-radius:20px;
padding:25px;
box-shadow:0 12px 35px rgba(0,0,0,.2);
}
h1,h2{
text-align:center;
color:#0b1f4d;
}
input,select,textarea,button{
width:100%;
padding:13px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
font-size:15px;
}
button{
background:#1a73e8;
color:#fff;
font-weight:700;
border:none;
cursor:pointer;
}
button:hover{
opacity:.95;
}
.secondary{
background:#eef3ff;
color:#1a73e8;
}
.hidden{
display:none;
}
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}
.ain{
font-size:34px;
font-weight:800;
text-align:center;
padding:20px;
background:#f4f8ff;
border-radius:15px;
color:#1a73e8;
}
.status-card{
background:#f7faff;
padding:18px;
border-radius:12px;
margin-top:15px;
}
@media(max-width:700px){
.grid{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<div class="wrap">
<div class="card">

<div id="loginPage">
<h1>Zracross Complaint Portal</h1>

<input id="email" type="email" placeholder="Email address">
<button onclick="sendOTP()">Send OTP</button>

<input id="otp" placeholder="Enter OTP">
<button onclick="verifyOTP()">Login</button>

<button class="secondary" onclick="showPage('statusPage')">Status Check</button>
</div>


<div id="complaintPage" class="hidden">
<h2>Complaint Registration</h2>

<input id="loggedEmail" readonly>
<input id="pin" placeholder="Enter PIN">
<button onclick="fetchDetails()">Fetch Details</button>

<div class="grid">
<input id="name" readonly placeholder="Name">
<input id="account" readonly placeholder="Account Number">
<input id="ifsc" readonly placeholder="IFSC">
<input id="phone" placeholder="Phone Number">
</div>

<select id="subject" onchange="loadSubs()">
<option value="">Select Subject</option>
<option>Account Issues</option>
<option>Transaction Issues</option>
<option>Staff Behaviour</option>
<option>Loan Issues</option>
<option>KYC Issues</option>
<option>Fraud Complaint</option>
</select>

<select id="subsubject">
<option value="">Select Sub Subject</option>
</select>

<textarea id="message" rows="6" placeholder="Write your complaint"></textarea>

<button onclick="submitComplaint()">Submit Complaint</button>
</div>


<div id="successPage" class="hidden">
<h2>Complaint Registered Successfully</h2>
<div id="ainBox" class="ain"></div>
<p style="text-align:center;">Please save your AIN.</p>

<button onclick="resetPortal()">Submit Another Complaint</button>
<button class="secondary" onclick="showPage('statusPage')">Check Status</button>
</div>


<div id="statusPage" class="hidden">
<h2>Status Check</h2>

<input id="statusAin" placeholder="AIN-XXXXXXXX">
<button onclick="checkStatus()">Check Status</button>

<div id="statusResult"></div>

<button class="secondary" onclick="showPage('loginPage')">Back</button>
</div>

</div>
</div>

<script>
const OLD_API="https://script.google.com/macros/s/AKfycbzTfkw41vJ7OUUlTyN7MLg-aZB8ULTyKmNtMcrvyqzraArFLbjXX79YHvYtSF9zOML2Ag/exec";
const NEW_API="https://script.google.com/macros/s/AKfycbzfCkQNZHHS-kBqCy44llz0EjJRDZZ0cIA_yNJsDBERv1fgce7htX_4psDXydtEKlcm/exec";

let users=[];

const subs={
"Account Issues":["Account Access","PIN Problem"],
"Transaction Issues":["UPI Failed","Debit Not Credited","ATM Issue"],
"Staff Behaviour":["Rude Behaviour","Refused Service"],
"Loan Issues":["Loan Query","EMI Issue"],
"KYC Issues":["KYC Pending","Document Update"],
"Fraud Complaint":["Unauthorized Transaction","Suspicious Activity"]
};

function showPage(id){
["loginPage","complaintPage","successPage","statusPage"].forEach(p=>{
document.getElementById(p).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

function loadSubs(){
const s=document.getElementById("subject").value;
const ss=document.getElementById("subsubject");

ss.innerHTML='<option value="">Select Sub Subject</option>';

(subs[s]||[]).forEach(v=>{
ss.innerHTML+=`<option>${v}</option>`;
});
}

async function sendOTP(){
const email=document.getElementById("email").value.trim();

const res=await fetch(OLD_API,{
method:"POST",
body:JSON.stringify({
action:"sendOTP",
email:email
})
});

alert(await res.text());
}

async function verifyOTP(){
const email=document.getElementById("email").value.trim();
const otp=document.getElementById("otp").value.trim();

const res=await fetch(OLD_API,{
method:"POST",
body:JSON.stringify({
action:"verifyOTP",
email:email,
otp:otp
})
});

const t=await res.text();

if(t.includes("INVALID")){
alert("Invalid OTP");
return;
}

document.getElementById("loggedEmail").value=email;
showPage("complaintPage");
}

async function fetchDetails(){
if(!users.length){
users=await (await fetch(OLD_API)).json();
}

const email=document.getElementById("loggedEmail").value.toLowerCase();
const pin=document.getElementById("pin").value.trim();

const u=users.find(x=>
String(x.email).toLowerCase()===email &&
String(x.pin)===pin
);

if(!u){
alert("Invalid PIN");
return;
}

document.getElementById("name").value=u.name;
document.getElementById("account").value=u.account_no;
document.getElementById("ifsc").value=u.ifsc;
}

async function submitComplaint(){
const payload={
action:"submitComplaint",
name:document.getElementById("name").value.trim(),
account:document.getElementById("account").value.trim(),
ifsc:document.getElementById("ifsc").value.trim(),
email:document.getElementById("loggedEmail").value.trim(),
subject:document.getElementById("subject").value.trim(),
subsubject:document.getElementById("subsubject").value.trim(),
message:document.getElementById("message").value.trim()
};

const res=await fetch(NEW_API,{
method:"POST",
body:JSON.stringify(payload)
});

const data=await res.json();

if(!data.success){
alert(data.message);
return;
}

document.getElementById("ainBox").textContent=data.ain;
showPage("successPage");
}

async function checkStatus(){
const ain=document.getElementById("statusAin").value.trim();

const res=await fetch(NEW_API,{
method:"POST",
body:JSON.stringify({
action:"checkStatus",
ain:ain
})
});

const d=await res.json();

if(!d.success){
document.getElementById("statusResult").innerHTML="<p>Complaint not found</p>";
return;
}

document.getElementById("statusResult").innerHTML=`
<div class="status-card">
<p><b>Status:</b> ${d.status}</p>
<p><b>AIN:</b> ${d.ain}</p>
<p><b>Subject:</b> ${d.subject}</p>
<p><b>Sub Subject:</b> ${d.subsubject}</p>
<p><b>Message:</b> ${d.message}</p>
<p><b>Date:</b> ${d.date}</p>
</div>
`;
}

function resetPortal(){
location.reload();
}
</script>

</body>
</html>
