<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zracross Complaint Portal</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0b1f4d,#1a73e8);
padding:20px;
}
.card{
max-width:1100px;
margin:auto;
background:#fff;
border-radius:20px;
padding:25px;
box-shadow:0 15px 40px rgba(0,0,0,.2);
}
h1,h2,h3{color:#0b1f4d;text-align:center;}
input,select,textarea,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
font-size:15px;
}
button{
background:#1a73e8;
color:#fff;
font-weight:bold;
border:none;
cursor:pointer;
}
.secondary{
background:#eef3ff;
color:#1a73e8;
}
.hidden{display:none;}
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}
.tabs button{
width:auto;
padding:10px 16px;
margin-right:8px;
}
.list-item{
padding:12px;
border:1px solid #ddd;
border-radius:10px;
margin:8px 0;
cursor:pointer;
}
.detail-box{
background:#f7faff;
padding:15px;
border-radius:12px;
margin-top:15px;
}
@media(max-width:700px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="card">

<div id="loginPage">
<h1>Zracross Complaint Portal</h1>

<input id="email" type="email" placeholder="Email Address">
<button onclick="sendOTP()">Send OTP</button>

<input id="otp" placeholder="Enter OTP">
<button onclick="verifyOTP()">Login</button>

<button class="secondary" onclick="showPage('statusPage')">Check Status</button>
<button class="secondary" onclick="showPage('officialLogin')">Official Login</button>
</div>

<div id="complaintPage" class="hidden">
<h2>Complaint Registration</h2>

<input id="loggedEmail" readonly>
<input id="pin" placeholder="Enter PIN">
<button onclick="fetchDetails()">Fetch Details</button>

<div class="grid">
<input id="name" readonly placeholder="Name">
<input id="account" readonly placeholder="Account Number">
<input id="ifsc" readonly placeholder="IFSC">
<input id="phone" placeholder="Phone Number">
</div>

<select id="subject">
<option value="">Select Subject</option>
<option>Account Issues</option>
<option>Transaction Issues</option>
<option>Staff Behaviour</option>
<option>Loan Issues</option>
<option>KYC Issues</option>
<option>Fraud Complaint</option>
</select>

<input id="subsubject" placeholder="Sub Subject">

<textarea id="message" rows="6" placeholder="Write Complaint"></textarea>

<button onclick="submitComplaint()">Submit Complaint</button>
</div>

<div id="statusPage" class="hidden">
<h2>Complaint Status Check</h2>
<input id="statusAin" placeholder="Enter AIN">
<button onclick="checkStatus()">Check Status</button>
<div id="statusResult"></div>
<button class="secondary" onclick="showPage('loginPage')">Back</button>
</div>

<div id="officialLogin" class="hidden">
<h2>Official Login</h2>
<input id="offIfsc" placeholder="Official IFSC">
<input id="offPass" type="password" placeholder="Password">
<button onclick="officialLogin()">Login</button>
<button class="secondary" onclick="showPage('loginPage')">Back</button>
</div>

<div id="officialDashboard" class="hidden">
<h2>Official Dashboard</h2>

<div class="tabs">
<button onclick="loadComplaints('all')">All</button>
<button onclick="loadComplaints('Pending')">Pending</button>
<button onclick="loadComplaints('Solved')">Solved</button>
</div>

<div id="complaintList"></div>
<div id="detailBox"></div>

<button class="secondary" onclick="logoutOfficial()">Logout</button>
</div>

</div>

<script>
const OTP_API = "https://script.google.com/macros/s/AKfycbzTfkw41vJ7OUUlTyN7MLg-aZB8ULTyKmNtMcrvyqzraArFLbjXX79YHvYtSF9zOML2Ag/exec";
const COMPLAINT_API = "https://script.google.com/macros/s/AKfycbwbJYWdo-_mvn1Wxmy3ku2bbs24yVj1HMZDL6ABKZswDtcwgr9B14pPKamuIU8hIrP_/exec";

let users = [];
let complaintCache = [];
let filteredComplaints = [];

function showPage(id){
[
"loginPage",
"complaintPage",
"statusPage",
"officialLogin",
"officialDashboard"
].forEach(p=>{
document.getElementById(p).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

async function sendOTP(){
const email = document.getElementById("email").value.trim();

const res = await fetch(OTP_API,{
method:"POST",
body:JSON.stringify({
action:"sendOTP",
email:email
})
});

alert(await res.text());
}

async function verifyOTP(){
const email = document.getElementById("email").value.trim();
const otp = document.getElementById("otp").value.trim();

const res = await fetch(OTP_API,{
method:"POST",
body:JSON.stringify({
action:"verifyOTP",
email:email,
otp:otp
})
});

const txt = await res.text();

if(txt.includes("INVALID")){
alert("Invalid OTP");
return;
}

document.getElementById("loggedEmail").value = email;
showPage("complaintPage");
}

async function fetchDetails(){
if(!users.length){
users = await (await fetch(OTP_API)).json();
}

const email = document.getElementById("loggedEmail").value.toLowerCase();
const pin = document.getElementById("pin").value.trim();

const user = users.find(u =>
String(u.email).toLowerCase() === email &&
String(u.pin) === pin
);

if(!user){
alert("Invalid PIN");
return;
}

document.getElementById("name").value = user.name;
document.getElementById("account").value = user.account_no;
document.getElementById("ifsc").value = user.ifsc;
}

async function submitComplaint(){
const payload = {
action:"submitComplaint",
name:document.getElementById("name").value.trim(),
account:document.getElementById("account").value.trim(),
ifsc:document.getElementById("ifsc").value.trim(),
phone:document.getElementById("phone").value.trim(),
email:document.getElementById("loggedEmail").value.trim(),
subject:document.getElementById("subject").value.trim(),
subsubject:document.getElementById("subsubject").value.trim(),
message:document.getElementById("message").value.trim()
};

const res = await fetch(COMPLAINT_API,{
method:"POST",
body:JSON.stringify(payload)
});

const d = await res.json();

if(!d.success){
alert(d.message);
return;
}

alert("Complaint Submitted. AIN: " + d.ain);
location.reload();
}

async function checkStatus(){
const ain = document.getElementById("statusAin").value.trim();

const res = await fetch(COMPLAINT_API,{
method:"POST",
body:JSON.stringify({
action:"checkStatus",
ain:ain
})
});

const d = await res.json();

if(!d.success){
document.getElementById("statusResult").innerHTML = "<p>Complaint not found</p>";
return;
}

document.getElementById("statusResult").innerHTML = `
<div class="detail-box">
<p><b>Status:</b> ${d.status}</p>
<p><b>AIN:</b> ${d.ain}</p>
<p><b>Name:</b> ${d.name}</p>
<p><b>Phone:</b> ${d.phone}</p>
<p><b>Subject:</b> ${d.subject}</p>
<p><b>Sub Subject:</b> ${d.subsubject}</p>
<p><b>Message:</b> ${d.message}</p>
<p><b>Date:</b> ${d.date}</p>
</div>
`;
}

function officialLogin(){
const ifsc = document.getElementById("offIfsc").value.trim();
const pass = document.getElementById("offPass").value.trim();

if(ifsc === "TBIJ000001" && pass === "Simrin0209"){
showPage("officialDashboard");
loadComplaints("all");
}else{
alert("Invalid credentials");
}
}

async function loadComplaints(filter){
const res = await fetch(COMPLAINT_API);
complaintCache = await res.json();

if(!Array.isArray(complaintCache)){
alert("Backend list API required");
return;
}

filteredComplaints = complaintCache;

if(filter !== "all"){
filteredComplaints = complaintCache.filter(c =>
String(c.status).includes(filter)
);
}

document.getElementById("complaintList").innerHTML =
filteredComplaints.map((c,i)=>`
<div class="list-item" onclick="viewComplaint(${i})">
<b>${c.ain}</b> - ${c.name} - ${c.status}
</div>
`).join("");
}

function viewComplaint(i){
const c = filteredComplaints[i];

document.getElementById("detailBox").innerHTML = `
<div class="detail-box">
<h3>Complaint Details</h3>

<p><b>AIN:</b> ${c.ain}</p>
<p><b>Name:</b> ${c.name}</p>
<p><b>Account No:</b> ${c.account}</p>
<p><b>IFSC:</b> ${c.ifsc}</p>
<p><b>Phone:</b> ${c.phone}</p>
<p><b>Email:</b> ${c.email}</p>
<p><b>Subject:</b> ${c.subject}</p>
<p><b>Sub Subject:</b> ${c.subsubject}</p>
<p><b>Message:</b> ${c.message}</p>
<p><b>Date/Time:</b> ${c.date}</p>
<p><b>Status:</b> ${c.status}</p>

<select id="newStatus">
<option>Pending</option>
<option>Accepted</option>
<option>Rejected</option>
<option>Solved</option>
</select>

<input id="remark" placeholder="Enter Remark">

<button onclick="updateStatus('${c.ain}')">Update Status</button>
</div>
`;
}

async function updateStatus(ain){
const status = document.getElementById("newStatus").value;
const remark = document.getElementById("remark").value.trim();

const res = await fetch(COMPLAINT_API,{
method:"POST",
body:JSON.stringify({
action:"updateStatus",
ain:ain,
status:status,
remark:remark
})
});

const d = await res.json();
alert(d.message);
loadComplaints("all");
}

function logoutOfficial(){
location.reload();
}
</script>

</body>
</html>
