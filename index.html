<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zracross Complaint Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
background:linear-gradient(135deg,#0b1f4d,#1a73e8);
min-height:100vh;
padding:20px;
}
.container{
max-width:1200px;
margin:auto;
background:#fff;
border-radius:20px;
box-shadow:0 15px 50px rgba(0,0,0,.25);
padding:25px;
}
h1,h2,h3{text-align:center;color:#0b1f4d;margin-bottom:15px}
input,select,textarea,button{
width:100%;
padding:13px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}
button{
background:#1a73e8;
color:#fff;
border:none;
font-weight:bold;
cursor:pointer;
}
button:hover{opacity:.95}
.secondary{
background:#eef3ff;
color:#1a73e8;
}
.hidden{display:none}
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}
.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}
.tabs button{width:auto}
.card{
background:#f8fbff;
padding:15px;
border-radius:12px;
border:1px solid #dce8ff;
margin:10px 0;
cursor:pointer;
}
.success-box{
text-align:center;
padding:30px;
background:#f5faff;
border-radius:15px;
}
.ain{
font-size:32px;
font-weight:800;
color:#1a73e8;
padding:15px;
background:#fff;
border-radius:12px;
margin:15px 0;
}
.msg{
padding:12px;
border-radius:10px;
margin:10px 0;
text-align:center;
font-weight:bold;
}
.success{background:#e8f8ec;color:#1b7d34}
.error{background:#ffe9e9;color:#b02a2a}
@media(max-width:700px){
.grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="container">

<div id="messageBox"></div>

<div id="loginPage">
<h1>Zracross Complaint Portal</h1>
<input id="email" type="email" placeholder="Enter Email Address">
<button onclick="sendOTP()">Send OTP</button>
<input id="otp" placeholder="Enter OTP">
<button onclick="verifyOTP()">Login</button>
<button class="secondary" onclick="showPage('statusPage')">Check Complaint Status</button>
<button class="secondary" onclick="showPage('officialLogin')">Official Login</button>
</div>

<div id="complaintPage" class="hidden">
<h2>Complaint Registration</h2>
<input id="loggedEmail" readonly>
<input id="pin" placeholder="Enter PIN">
<button onclick="fetchDetails()">Fetch Customer Details</button>

<div class="grid">
<input id="name" readonly placeholder="Name">
<input id="account" readonly placeholder="Account Number">
<input id="ifsc" readonly placeholder="IFSC">
<input id="phone" placeholder="Phone Number">
</div>

<select id="subject" onchange="loadSubSubjects()">
<option value="">Select Subject</option>
<option value="Account Issues">Account Issues</option>
<option value="Transaction Issues">Transaction Issues</option>
<option value="Staff Behaviour">Staff Behaviour</option>
<option value="Loan Issues">Loan Issues</option>
<option value="KYC Issues">KYC Issues</option>
<option value="Fraud Complaint">Fraud Complaint</option>
</select>

<select id="subsubject">
<option value="">Select Sub Subject</option>
</select>

<textarea id="message" rows="6" placeholder="Write your complaint"></textarea>
<button onclick="submitComplaint()">Submit Complaint</button>
</div>

<div id="successPage" class="hidden">
<div class="success-box">
<h2>Complaint Submitted Successfully</h2>
<div id="ainDisplay" class="ain"></div>
<p>Please save your AIN for tracking.</p>
<button onclick="showPage('statusPage')">Check Status</button>
<button class="secondary" onclick="location.reload()">New Complaint</button>
</div>
</div>

<div id="statusPage" class="hidden">
<h2>Complaint Status Check</h2>
<input id="statusAin" placeholder="Enter AIN">
<button onclick="checkStatus()">Check Status</button>
<div id="statusResult"></div>
<button class="secondary" onclick="showPage('loginPage')">Back</button>
</div>

<div id="officialLogin" class="hidden">
<h2>Official Login</h2>
<input id="offIfsc" placeholder="Enter IFSC">
<input id="offPass" type="password" placeholder="Enter Password">
<button onclick="officialLogin()">Login</button>
<button class="secondary" onclick="showPage('loginPage')">Back</button>
</div>

<div id="officialDashboard" class="hidden">
<h2>Official Dashboard</h2>

<div class="tabs">
<button onclick="loadComplaints('all')">All</button>
<button onclick="loadComplaints('Pending')">Pending</button>
<button onclick="loadComplaints('Solved')">Solved</button>
</div>

<div id="complaintList"></div>
<div id="detailBox"></div>

<button class="secondary" onclick="logoutOfficial()">Logout</button>
</div>

</div>

<script>
const OTP_API="https://script.google.com/macros/s/AKfycbzTfkw41vJ7OUUlTyN7MLg-aZB8ULTyKmNtMcrvyqzraArFLbjXX79YHvYtSF9zOML2Ag/exec";
const COMPLAINT_API="https://script.google.com/macros/s/AKfycbxDpV6rK6tG8CiHcUoLuyBnCugUumimX8iuxd1x3m7dGlCqD55vPcEGaSOLo4aFofTV/exec";

let users=[];
let complaints=[];
let filtered=[];

const subSubjects={
"Account Issues":["Account Access","PIN Problem","Balance Issue"],
"Transaction Issues":["UPI Failed","ATM Failed","Money Debited Not Credited"],
"Staff Behaviour":["Rude Behaviour","Refused Service"],
"Loan Issues":["Loan Query","EMI Issue"],
"KYC Issues":["KYC Pending","Document Update"],
"Fraud Complaint":["Unauthorized Transaction","Suspicious Activity"]
};

function msg(text,type){
document.getElementById("messageBox").innerHTML=`<div class="msg ${type}">${text}</div>`;
setTimeout(()=>{document.getElementById("messageBox").innerHTML=""},4000);
}

function showPage(id){
["loginPage","complaintPage","successPage","statusPage","officialLogin","officialDashboard"].forEach(p=>{
document.getElementById(p).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

function loadSubSubjects(){
const subject=document.getElementById("subject").value;
const sub=document.getElementById("subsubject");
sub.innerHTML='<option value="">Select Sub Subject</option>';
(subSubjects[subject]||[]).forEach(s=>{
sub.innerHTML+=`<option>${s}</option>`;
});
}

async function sendOTP(){
const email=document.getElementById("email").value.trim();
if(!email){msg("Enter email","error");return;}

const res=await fetch(OTP_API,{
method:"POST",
body:JSON.stringify({action:"sendOTP",email})
});

msg(await res.text(),"success");
}

async function verifyOTP(){
const email=document.getElementById("email").value.trim();
const otp=document.getElementById("otp").value.trim();

const res=await fetch(OTP_API,{
method:"POST",
body:JSON.stringify({action:"verifyOTP",email,otp})
});

const txt=await res.text();

if(txt.includes("INVALID")){
msg("Invalid OTP","error");
return;
}

document.getElementById("loggedEmail").value=email;
showPage("complaintPage");
}

async function fetchDetails(){
if(!users.length){
users=await (await fetch(OTP_API)).json();
}

const email=document.getElementById("loggedEmail").value.toLowerCase();
const pin=document.getElementById("pin").value.trim();

const u=users.find(x=>
String(x.email).toLowerCase()===email &&
String(x.pin)===pin
);

if(!u){
msg("Invalid PIN","error");
return;
}

name.value=u.name;
account.value=u.account_no;
ifsc.value=u.ifsc;
msg("Details fetched","success");
}

async function submitComplaint(){
const payload={
action:"submitComplaint",
name:name.value.trim(),
account:account.value.trim(),
ifsc:ifsc.value.trim(),
phone:phone.value.trim(),
email:loggedEmail.value.trim(),
subject:subject.value.trim(),
subsubject:subsubject.value.trim(),
message:message.value.trim()
};

const res=await fetch(COMPLAINT_API,{
method:"POST",
body:JSON.stringify(payload)
});

const d=await res.json();

if(!d.success){
msg(d.message,"error");
return;
}

document.getElementById("ainDisplay").textContent=d.ain;
showPage("successPage");
}

async function checkStatus(){
const ain=statusAin.value.trim();

const res=await fetch(COMPLAINT_API,{
method:"POST",
body:JSON.stringify({action:"checkStatus",ain})
});

const d=await res.json();

if(!d.success){
statusResult.innerHTML="<div class='card'>Complaint not found</div>";
return;
}

statusResult.innerHTML=`
<div class="card">
<p><b>Status:</b> ${d.status}</p>
<p><b>AIN:</b> ${d.ain}</p>
<p><b>Name:</b> ${d.name}</p>
<p><b>Phone:</b> ${d.phone}</p>
<p><b>Subject:</b> ${d.subject}</p>
<p><b>Sub Subject:</b> ${d.subsubject}</p>
<p><b>Message:</b> ${d.message}</p>
<p><b>Date:</b> ${d.date}</p>
</div>
`;
}

function officialLogin(){
if(offIfsc.value==="TBIJ000001" && offPass.value==="Simrin0209"){
showPage("officialDashboard");
loadComplaints("all");
}else{
msg("Invalid official credentials","error");
}
}

async function loadComplaints(filter){
const res=await fetch(COMPLAINT_API);
complaints=await res.json();

filtered=complaints;

if(filter!=="all"){
filtered=complaints.filter(c=>String(c.status).includes(filter));
}

complaintList.innerHTML=filtered.map((c,i)=>`
<div class="card" onclick="viewComplaint(${i})">
<b>${c.ain}</b><br>
${c.name}<br>
${c.status}
</div>
`).join("");
}

function viewComplaint(i){
const c=filtered[i];

detailBox.innerHTML=`
<div class="card">
<h3>Complaint Details</h3>
<p><b>AIN:</b> ${c.ain}</p>
<p><b>Name:</b> ${c.name}</p>
<p><b>Account No:</b> ${c.account}</p>
<p><b>IFSC:</b> ${c.ifsc}</p>
<p><b>Phone:</b> ${c.phone}</p>
<p><b>Email:</b> ${c.email}</p>
<p><b>Subject:</b> ${c.subject}</p>
<p><b>Sub Subject:</b> ${c.subsubject}</p>
<p><b>Message:</b> ${c.message}</p>
<p><b>Date:</b> ${c.date}</p>
<p><b>Status:</b> ${c.status}</p>

<select id="newStatus">
<option>Pending</option>
<option>Accepted</option>
<option>Rejected</option>
<option>Solved</option>
</select>

<input id="remark" placeholder="Enter remark">
<button onclick="updateStatus('${c.ain}')">Update Status</button>
</div>
`;
}

async function updateStatus(ain){
const res=await fetch(COMPLAINT_API,{
method:"POST",
body:JSON.stringify({
action:"updateStatus",
ain:ain,
status:newStatus.value,
remark:remark.value.trim()
})
});

const d=await res.json();
msg(d.message,d.success?"success":"error");
loadComplaints("all");
}

function logoutOfficial(){
location.reload();
}
</script>

</body>
</html>
